name: Fix Paths for GitHub Pages

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  fix-paths:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Create path fixing script
        run: |
          cat > fix-paths.js << 'EOF'
          const fs = require('fs');
          const path = require('path');
          
          const BASE_PATH = '/Override';
          const ROOT = process.cwd();
          
          // File extensions to process
          const EXTENSIONS = ['.html', '.js'];
          
          // Collect all files
          function getAllFiles(dir) {
            let files = [];
            const items = fs.readdirSync(dir, { withFileTypes: true });
            
            for (const item of items) {
              if (item.name.startsWith('.')) continue;
              if (['node_modules', '.git', 'dist', 'build'].includes(item.name)) continue;
              
              const fullPath = path.join(dir, item.name);
              if (item.isDirectory()) {
                files = files.concat(getAllFiles(fullPath));
              } else if (EXTENSIONS.includes(path.extname(item.name))) {
                files.push(fullPath);
              }
            }
            return files;
          }
          
          // Fix absolute paths in file
          function fixFile(filePath) {
            let content = fs.readFileSync(filePath, 'utf-8');
            let modified = false;
            
            // Pattern: href="/...", src="/...", url("...") but NOT in comments or data-*
            // Match absolute paths starting with /assets, /ru, /en, /ru/, /en/ etc
            const absolutePathPattern = /(?:href|src|url)\s*=\s*["'](?!http|\/\/)\/(?!Override)([\w\-/\.]*)?["']/g;
            
            if (absolutePathPattern.test(content)) {
              content = content.replace(
                /(?:href|src|url)\s*=\s*["'](?!http|\/\/)\/(?!Override)([\w\-/\.]*)?["']/g,
                (match) => {
                  const quote = match.includes('"') ? '"' : "'";
                  const path = match.split('=')[1].slice(1, -1); // Extract path
                  return match.split('=')[0] + '=' + quote + BASE_PATH + path + quote;
                }
              );
              modified = true;
            }
            
            // Fix in JavaScript string patterns (href assignment, navigation, etc)
            // Look for patterns like: href="/" or href='/'
            const jsHrefPattern = /(['"])\/(?!Override)/g;
            if (jsHrefPattern.test(content)) {
              content = content.replace(
                /(['"])\/(?!Override)([^'"]*)(['"])/g,
                (match, quote1, path, quote2) => {
                  if (path.startsWith('http') || path.startsWith('//')) return match;
                  return quote1 + BASE_PATH + '/' + path + quote2;
                }
              );
              modified = true;
            }
            
            if (modified) {
              fs.writeFileSync(filePath, content, 'utf-8');
              console.log(`✓ Fixed: ${path.relative(ROOT, filePath)}`);
            }
          }
          
          // Process all files
          const files = getAllFiles(ROOT);
          console.log(`Processing ${files.length} files...\n`);
          
          files.forEach(fixFile);
          console.log('\n✓ All files processed!');
          EOF
        
      - name: Run path fixing script
        run: node fix-paths.js

      - name: Verify changes
        run: |
          echo "=== Modified files ===" 
          git diff --name-only
          echo ""
          echo "=== Sample changes ===" 
          git diff --no-color | head -50

      - name: Commit and push if changes exist
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          
          if [[ -n $(git status -s) ]]; then
            git add -A
            git commit -m "fix: Auto-fix absolute paths for GitHub Pages deployment"
            git push
            echo "✓ Changes committed and pushed"
          else
            echo "No changes to commit"
          fi
