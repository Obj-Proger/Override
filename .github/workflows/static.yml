name: Fix Base Path and Deploy

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  fix-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fix base href in all HTML files
        run: |
          find . -name "*.html" -type f | while read file; do
            # Add <base> tag after <title> if not present
            if ! grep -q '<base href=' "$file"; then
              sed -i '/<title>/{a\    <base href="/Override/">
              }' "$file"
            fi
          done
          echo "✓ Added <base> tags to all HTML files"

      - name: Verify changes
        run: |
          echo "=== Files with base tag ==="
          grep -l '<base href=' *.html ru/*.html en/*.html 2>/dev/null | head -10

      - name: Commit changes if any
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          if git diff --quiet; then
            echo "No changes needed"
          else
            git add -A
            git commit -m "fix: Add base href for GitHub Pages" || true
            git push
          fi

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
