name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Convert absolute paths to relative for subdirectory deployment
        run: |
          # Конвертация всех абсолютных путей /path в относительные ./path
          find . -type f \( -name "*.html" -o -name "*.js" -o -name "*.css" \) ! -path "./.git/*" ! -path "./node_modules/*" | while read file; do
            # Замена href="/path" на href="./path" (но не href="//" для protocol-relative URLs)
            sed -i 's|href="/\([^/]\)|href="./\1|g' "$file"
            # Замена src="/path" на src="./path" (но не src="//" для protocol-relative URLs)
            sed -i 's|src="/\([^/]\)|src="./\1|g' "$file"
            # Для JS: замена пути в fetch, window.location и других динамических обращениях
            sed -i "s|'/\([^/]\)|'./\1|g" "$file"
            sed -i 's|"/\([^/]\)|"./\1|g' "$file"
            # Удаление двойных путей типа "././"
            sed -i 's|href="\./\./|href="./|g' "$file"
            sed -i 's|src="\./\./|src="./|g' "$file"
            sed -i "s|'\./\./|'./|g" "$file"
            sed -i 's|"\./\./|"./|g' "$file"
            # Замена пустых путей "./" на "./index"
            sed -i 's|href="\./"|href="./index"|g' "$file"
            sed -i 's|src="\./"|src="./index"|g' "$file"
            sed -i "s|'\./\"|'./index\"|g" "$file"
            sed -i 's|"\./"|"./index"|g' "$file"
          done

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
