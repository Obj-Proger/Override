name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Inject base href tag
        env:
          BASE: ${{ steps.pages.outputs.base_path }}
        run: |
          python3 << 'PYEOF'
          import os, re

          BASE = os.environ.get('BASE', '').rstrip('/')
          
          # Если BASE пусто (custom domain или root) — не трогает
          if not BASE:
              print("No base path needed")
              exit(0)

          print(f"Injecting <base href=\"{BASE}/\">")

          for root, dirs, files in os.walk('.'):
              dirs[:] = [d for d in dirs if d not in ('.git', '.github', 'node_modules')]
              
              for fname in files:
                  if not fname.endswith('.html'):
                      continue
                  
                  fpath = os.path.join(root, fname)
                  with open(fpath, 'r', encoding='utf-8') as f:
                      html = f.read()
                  
                  # Если <base> уже есть — пропуск
                  if '<base' in html:
                      continue
                  
                  # Вставка <base> после <head>
                  new_html = html.replace(
                      '<head>',
                      f'<head>\n    <base href="{BASE}/">'
                  )
                  
                  if new_html != html:
                      with open(fpath, 'w', encoding='utf-8') as f:
                          f.write(new_html)
                      print(f"  injected in {fpath}")

          PYEOF

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
