name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fix absolute links for subdirectory
        run: |
          # Изменение всех абсолютных ссылок /path на /Override/path
          find . -type f \( -name "*.html" -o -name "*.js" -o -name "*.css" \) ! -path "./.git/*" ! -path "./node_modules/*" | while read file; do
            sed -i 's|href="/|href="/Override/|g' "$file"
            sed -i 's|src="/|src="/Override/|g' "$file"
            sed -i 's|window.location.replace("\([^"]*\)")|window.location.replace("/Override/\1")|g' "$file"
          done

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
