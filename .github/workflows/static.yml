name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Convert absolute paths to relative for subdirectory deployment
        run: |
           # Замена абсолютных путей вида href="/path/file.html" на href="./path/file.html"
            sed -i 's|href="/\([^/].*\)"|href="./\1"|g' "$file"
            sed -i "s|href='/\([^/].*\)'|href='./\1'|g" "$file"
            
            # Замена для src атрибутов
            sed -i 's|src="/\([^/].*\)"|src="./\1"|g' "$file"
            sed -i "s|src='/\([^/].*\)'|src='./\1'|g" "$file"
            
            # Замена в JavaScript кодде (в строках)
            sed -i "s|url: '/\([^/].*\)'|url: './\1'|g" "$file"
            sed -i 's|url: "/\([^/].*\)"|url: "./\1"|g' "$file"
            
            # Другие случаи в JS (fetch, window.location и т.д.)
            sed -i "s|'/\([^/].*\)'|'./\1'|g" "$file"
            sed -i 's|"/\([^/].*\)"|\"./\1\"|g' "$file"
            
            # Очистка от случайных двойных точек (только если реально есть ././)
            sed -i 's|/\./|/|g' "$file"
          done

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
