<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Override</title>
    <link rel="icon" type="image/svg+xml" href="/assets/img/logo.svg">

    <style>
        /* Reset */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        /* Light theme (default) */
        :root {
            --bg: #ffffff;
            --bg-card: #f6f8fa;
            --border: #d0d7de;
            --text: #1f2328;
            --text-muted: #656d76;
            --accent: #0969da;
            --accent-hover: #0550ae;
            --radius: 12px;
        }

        /* Dark theme via browser preference */
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #0d1117;
                --bg-card: #161b22;
                --border: #30363d;
                --text: #c9d1d9;
                --text-muted: #8b949e;
                --accent: #58a6ff;
                --accent-hover: #79c0ff;
            }
        }

        /* Base */
        html, body {
            height: 100%;
        }

        body {
            font: 16px/1.5 system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 24px;
        }

        /* Card */
        .card {
            width: 100%;
            max-width: 420px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 48px 40px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 32px;
        }

        /* Logo area */
        .logo {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 56px;
            height: 56px;
        }

        .logo-title {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: var(--text);
        }

        .logo-subtitle {
            font-size: 0.9rem;
            color: var(--text-muted);
            line-height: 1.4;
        }

        /* Divider */
        .divider {
            width: 100%;
            height: 1px;
            background: var(--border);
        }

        /* 404 block */
        .error-block {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            width: 100%;
        }

        .error-code {
            font-size: 4rem;
            font-weight: 700;
            letter-spacing: -2px;
            line-height: 1;
            color: var(--accent);
            font-variant-numeric: tabular-nums;
        }

        .error-title {
            font-size: 1.05rem;
            font-weight: 600;
            color: var(--text);
        }

        .error-desc {
            font-size: 0.88rem;
            color: var(--text-muted);
            line-height: 1.5;
            max-width: 300px;
            text-align: center;
        }

        /* Action buttons */
        .actions {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 100%;
        }

        .btn-primary {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            padding: 13px 18px;
            background: var(--accent);
            color: #fff;
            border: 1px solid transparent;
            border-radius: 8px;
            font: inherit;
            font-size: 0.95rem;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            transition: background 0.15s, opacity 0.15s;
        }

            .btn-primary:hover {
                background: var(--accent-hover);
            }

        .btn-secondary {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            padding: 13px 18px;
            background: var(--bg);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 8px;
            font: inherit;
            font-size: 0.95rem;
            font-weight: 500;
            text-decoration: none;
            cursor: pointer;
            transition: border-color 0.15s, color 0.15s;
        }

            .btn-secondary:hover {
                border-color: var(--accent);
                color: var(--accent);
            }

        .btn-icon {
            width: 16px;
            height: 16px;
            flex-shrink: 0;
            stroke: currentColor;
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        /* Footer */
        footer {
            margin-top: auto;
            width: 100%;
            padding: 20px 24px;
            text-align: center;
        }

        .footer-inner {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .footer-copy,
        .footer-made {
            font-size: 0.82rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
        }

        .footer-heart {
            width: 13px;
            height: 13px;
            fill: none;
            stroke: #e53e3e;
            stroke-width: 2px;
            stroke-linecap: round;
            stroke-linejoin: round;
            overflow: visible;
            flex-shrink: 0;
            display: block;
        }

        @media (prefers-color-scheme: dark) {
            .footer-heart {
                stroke: #93c5fd;
            }
        }

        /* Responsive */
        @media (max-width: 480px) {
            body {
                padding: 16px;
            }

            .card {
                padding: 32px 20px;
                gap: 24px;
                border-radius: 10px;
            }

            .logo-title {
                font-size: 1.5rem;
            }

            .logo-subtitle {
                font-size: 0.82rem;
            }

            .logo-icon {
                width: 44px;
                height: 44px;
            }

            .error-code {
                font-size: 3rem;
            }

            .btn-primary,
            .btn-secondary {
                padding: 12px 14px;
            }
        }

        @media (max-width: 360px) {
            .card {
                padding: 24px 16px;
            }

            .logo-title {
                font-size: 1.3rem;
            }
        }

        /* Landscape mobile */
        @media (max-height: 500px) and (orientation: landscape) {
            body {
                justify-content: flex-start;
                padding: 16px;
            }

            .card {
                flex-direction: row;
                flex-wrap: wrap;
                max-width: 640px;
                padding: 24px 28px;
                gap: 20px;
                align-items: center;
            }

            .logo {
                flex-direction: row;
                gap: 14px;
                flex: 1 1 200px;
                text-align: left;
                align-items: center;
            }

                .logo > div {
                    text-align: left;
                }

            .divider {
                display: none;
            }

            .error-block {
                flex: 1 1 180px;
                align-items: flex-start;
                text-align: left;
            }

            .error-desc {
                text-align: left;
            }

            .actions {
                flex: 1 1 100%;
                flex-direction: row;
            }
        }
    </style>

    <!--
        Runs before render — no defer/async intentional.
        Reads saved language, sets <html lang> and data-lang attribute.
        The body script reads data-lang to apply translations.
    -->
    <script>
        (function () {
            var SUPPORTED = ['ru', 'en'];
            var DEFAULT   = 'ru';
            var KEY       = 'override-lang';

            function getLang() {
                var saved = localStorage.getItem(KEY);
                if (saved && SUPPORTED.indexOf(saved) !== -1) { return saved; }
                var browserLang = (navigator.language || '').substring(0, 2).toLowerCase();
                if (SUPPORTED.indexOf(browserLang) !== -1) { return browserLang; }
                return DEFAULT;
            }

            var lang = getLang();
            localStorage.setItem(KEY, lang);
            document.documentElement.lang = lang;
            document.documentElement.setAttribute('data-lang', lang);
            document.title = lang === 'ru' ? '404 — Override' : '404 — Override';
        })();
    </script>
</head>
<body>

    <div class="card">

        <!-- Logo -->
        <div class="logo">
            <svg class="logo-icon" viewBox="0 0 88.94 77.02" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <path fill="#3949ac" stroke="none" stroke-miterlimit="10" stroke-width="3" d="M51.76,43.35L32.99,10.84,27.6,1.5H2.6l41.87,72.52,8.82-15.27,3.68-6.38-5.21-9.02ZM44.45,56.01L18.37,10.84h7.26l22.45,38.88-3.63,6.29Z" />
                <polygon fill="#822c98" stroke="none" stroke-miterlimit="10" stroke-width="3" points="86.34 1.5 59.46 48.06 54.25 39.04 37.97 10.84 32.58 1.5 43.68 1.5 49.07 10.84 59.8 29.43 59.81 29.45 75.95 1.5 86.34 1.5" />
            </svg>
            <div>
                <div class="logo-title">Override</div>
                <div class="logo-subtitle" id="js-subtitle">Documentation for developers</div>
            </div>
        </div>

        <div class="divider"></div>

        <!-- 404 -->
        <div class="error-block">
            <div class="error-code">404</div>
            <div class="error-title" id="js-error-title">Page not found</div>
            <p class="error-desc" id="js-error-desc">This page doesn't exist or has been moved.</p>
        </div>

        <!-- Actions -->
        <div class="actions">
            <a class="btn-primary" id="js-btn-home" href="/">
                <svg class="btn-icon" viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
                    <polyline points="9 22 9 12 15 12 15 22" />
                </svg>
                Go home
            </a>
            <button class="btn-secondary" id="js-btn-back" onclick="history.back()">
                <svg class="btn-icon" viewBox="0 0 24 24" aria-hidden="true">
                    <polyline points="15 18 9 12 15 6" />
                </svg>
                Go back
            </button>
        </div>

    </div>

    <footer>
        <div class="footer-inner">
            <p class="footer-copy">© 2026 Obj-Proger. <span id="js-footer-right">All rights reserved.</span></p>
            <p class="footer-made">
                <span id="js-footer-made">Made with</span>
                <svg class="footer-heart" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                    <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z" />
                </svg>
                <span id="js-footer-for">for developers</span>
            </p>
        </div>
    </footer>

    <script>
        (function () {
            var lang = document.documentElement.getAttribute('data-lang') || 'en';
            var isRu = lang === 'ru';

            var ids = ['js-subtitle', 'js-error-title', 'js-error-desc', 'js-footer-right', 'js-footer-made', 'js-footer-for'];
            var ru = ['Документация для разработчиков', 'Страница не найдена', 'Такой страницы не существует или она была перемещена.', 'Все права защищены.', 'Сделано с', 'для разработчиков'];
            var en = ['Documentation for developers', 'Page not found', 'This page doesn\'t exist or has been moved.', 'All rights reserved.', 'Made with', 'for developers'];
            var texts = isRu ? ru : en;

            for (var i = 0; i < ids.length; i++) {
                var el = document.getElementById(ids[i]);
                if (el) { el.textContent = texts[i]; }
            }

            // Home button
            var btnHome = document.getElementById('js-btn-home');
            if (btnHome) {
                btnHome.setAttribute('href', '/' + lang + '/');
                var iconHome = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
                iconHome.setAttribute('class', 'btn-icon');
                iconHome.setAttribute('viewBox', '0 0 24 24');
                iconHome.setAttribute('aria-hidden', 'true');
                iconHome.innerHTML = '<path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/> <polyline points = "9 22 9 12 15 12 15 22" />>';
                btnHome.textContent = '';
                btnHome.appendChild(iconHome);
                btnHome.appendChild(document.createTextNode(isRu ? 'На главную' : 'Go home'));
            }

            // Back button
            var btnBack = document.getElementById('js-btn-back');
            if (btnBack) {
                var iconBack = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
                iconBack.setAttribute('class', 'btn-icon');
                iconBack.setAttribute('viewBox', '0 0 24 24');
                iconBack.setAttribute('aria-hidden', 'true');
                iconBack.innerHTML = '<polyline points="15 18 9 12 15 6"/>';
                btnBack.textContent = '';
                btnBack.appendChild(iconBack);
                btnBack.appendChild(document.createTextNode(isRu ? 'Назад' : 'Go back'));
            }
        })();
    </script>

</body>
</html>
